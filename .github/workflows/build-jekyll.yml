name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_run:
    workflows:
      - Update News Every 12 Hours
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@3ff19f5e2baf30647122352b96108b1fbe250c64 # v1.299.0
        with:
          bundler-cache: true

      - name: Build site with Jekyll
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --trace --destination _site

      - name: Deploy to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          if git ls-remote --exit-code origin gh-pages > /dev/null 2>&1; then
            git worktree add _deploy origin/gh-pages
          else
            git worktree add -b gh-pages _deploy
          fi

          rsync -av --delete _site/ _deploy/
          touch _deploy/.nojekyll

          cd _deploy
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi

          git commit -m "Deploy site: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
