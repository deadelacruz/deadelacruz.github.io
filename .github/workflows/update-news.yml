name: Update News Every 12 Hours

on:
  schedule:
    # Run every 12 hours at 00:00 and 12:00 UTC
    - cron: '0 0,12 * * *'
  workflow_dispatch:

concurrency:
  group: update-news
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          # Keep install lightweight for GitHub Free usage.
          pip install pyyaml requests

      - name: Configure git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git config pull.rebase true
          git config pull.ff only

      - name: Sync latest branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          BRANCH="${GITHUB_REF_NAME:-$DEFAULT_BRANCH}"
          git fetch origin "$BRANCH"
          git pull --rebase origin "$BRANCH"

      - name: Update news
        id: update-news
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          if [ -z "$NEWSAPI_KEY" ]; then
            echo "::warning::NEWSAPI_KEY is not set. Skipping update so workflow stays green."
            echo "did_update=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python -m update_news
          echo "did_update=true" >> "$GITHUB_OUTPUT"

      - name: Update timestamp
        if: steps.update-news.outputs.did_update == 'true'
        run: |
          timestamp=$(TZ='Asia/Manila' date +'%Y-%m-%d %I:%M:%S %p')" GMT +8"
          echo "last_updated: \"$timestamp\"" > _data/news_last_updated.yml
          echo "Updated timestamp: $timestamp"

      - name: Check for changes
        id: verify-news-changed-files
        if: steps.update-news.outputs.did_update == 'true'
        run: |
          if [ -n "$(git status --porcelain _data/news/)" ]; then
            echo "news_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "news_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.update-news.outputs.did_update == 'true' && steps.verify-news-changed-files.outputs.news_changed == 'true'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          BRANCH="${GITHUB_REF_NAME:-$DEFAULT_BRANCH}"
          git add _data/news/ _data/news_last_updated.yml
          git commit -m "Auto-update news: $(date +'%Y-%m-%d %H:%M:%S')"

          MAX_RETRIES=3
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if git push origin "$BRANCH"; then
              echo "Successfully pushed to remote"
              break
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "Push failed, rebasing and retrying (attempt $RETRY_COUNT/$MAX_RETRIES)..."
              git pull --rebase origin "$BRANCH"
            else
              echo "Failed to push after $MAX_RETRIES attempts"
              exit 1
            fi
          done

      - name: Commit timestamp only
        if: steps.update-news.outputs.did_update == 'true' && steps.verify-news-changed-files.outputs.news_changed == 'false'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME:-$DEFAULT_BRANCH}"
          git add _data/news_last_updated.yml
          if ! git diff --cached --quiet; then
            git commit -m "Update news timestamp: $(date +'%Y-%m-%d %H:%M:%S')"

            MAX_RETRIES=3
            RETRY_COUNT=0

            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if git push origin "$BRANCH"; then
                echo "Successfully pushed timestamp update"
                break
              fi

              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "Timestamp push failed, rebasing and retrying (attempt $RETRY_COUNT/$MAX_RETRIES)..."
                git pull --rebase origin "$BRANCH"
              else
                echo "Failed to push timestamp after $MAX_RETRIES attempts"
                exit 1
              fi
            done
          else
            echo "No timestamp changes to commit"
          fi

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.update-news.outputs.did_update }}" = "false" ]; then
            echo "## Update News Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Workflow skipped NewsAPI fetch because NEWSAPI_KEY is missing." >> "$GITHUB_STEP_SUMMARY"
            echo "Add NEWSAPI_KEY in Settings > Secrets and variables > Actions." >> "$GITHUB_STEP_SUMMARY"
          fi
